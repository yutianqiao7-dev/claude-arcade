<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>NEMESIS — お前を学習する敵</title>
<style>
  html,body{margin:0;padding:0;background:#050508;font-family:"Segoe UI",system-ui,sans-serif;color:#e8e8f0;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none;overscroll-behavior:none;
    -webkit-tap-highlight-color:transparent;}
  .cv-wrap{position:relative;display:inline-block;margin-top:10px;}
  canvas{background:#08080e;border-radius:8px;box-shadow:0 0 50px rgba(255,40,70,.25);max-width:96vw;max-height:62vh;cursor:crosshair;touch-action:none;display:block;}
  #back{position:fixed;top:10px;left:12px;font-size:12px;color:#888;opacity:.6;text-decoration:none;z-index:5;}
  #back:hover{opacity:1;}
  .keys{font-size:12px;opacity:.5;padding:8px;text-align:center;}
  #rotatePrompt{display:none;position:fixed;inset:0;background:#050508;color:#e8e8f0;z-index:999;
    align-items:center;justify-content:center;text-align:center;font-size:20px;padding:20px;flex-direction:column;gap:14px;}
  @media (pointer:coarse) and (orientation:portrait){ #rotatePrompt{display:flex;} }
  #tc{display:none;width:960px;max-width:96vw;flex-direction:column;align-items:center;gap:8px;padding:6px 4px;box-sizing:border-box;}
  @media (pointer:coarse){
    #tc{display:flex;} .keys{display:none;}
    .cv-wrap{margin-top:2px;}
    canvas{max-height:94vh;}
    #tc{position:absolute;left:0;right:0;bottom:0;z-index:3;width:auto;max-width:none;
      pointer-events:none;padding:8px 10px calc(8px + env(safe-area-inset-bottom));}
    #tc>*{pointer-events:none;}
    #tc button,#tc .tc-hint{pointer-events:auto;}
    .tc-hint{position:absolute;left:12px;bottom:10px;font-size:9px;opacity:.55;background:none;padding:0;}
    .tc-row{position:static;}
  }
  .tc-btn{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;
    user-select:none;touch-action:none;cursor:pointer;outline:none;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-family:inherit;
    background:rgba(26,20,32,.35);color:rgba(255,159,184,.85);border:2px solid rgba(255,47,109,.4);
    border-radius:12px;backdrop-filter:blur(1px);}
  .tc-btn.active{background:rgba(255,47,109,.55);color:#fff;}
  .tc-btn:focus{outline:none;}
  .tc-row{display:none;gap:16px;align-items:center;width:100%;justify-content:center;}
  .tc-row.show{display:flex;}
  .tc-genbtn{width:110px;height:46px;font-size:13px;}
  .tc-hint{font-size:12px;opacity:.6;}
  #tcDash{width:78px;height:58px;font-size:13px;margin-left:auto;}
</style>
</head>
<body>
<div id="rotatePrompt">📱↻<br>横向きにしてプレイしてください<br><span style="font-size:13px;opacity:.7">Rotate your device to landscape</span></div>
<a id="back" href="index.html">← アーケードに戻る</a>
<div class="cv-wrap">
<canvas id="cv" width="960" height="600"></canvas>
<div id="tc">
  <div class="tc-row" id="tcGenRow">
    <button class="tc-btn tc-genbtn" id="tcGenL">◀ 世代</button>
    <button class="tc-btn tc-genbtn" id="tcGenR">世代 ▶</button>
  </div>
  <div class="tc-row" id="tcBattleRow">
    <span class="tc-hint">左側=移動　右側=狙って発射</span>
    <button class="tc-btn" id="tcDash">DASH</button>
  </div>
</div>
</div>
<div class="keys">WASD:移動　マウス:照準　クリック長押し:射撃　SPACE/SHIFT:緊急回避(無敵)　タイトルで←→:世代選択(過去世代と再戦可)　N:記憶消去　ESC:撤退</div>
<script>
"use strict";
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
const W=cv.width, H=cv.height;

/* ---------- サウンド ---------- */
let AC=null;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(f0,f1,dur,type,vol,delay=0){
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain(),t=a.currentTime+delay;
    o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur);
  }catch(e){}
}
const sfx={
  shoot(){tone(700,300,0.07,"square",0.03);},
  hitBoss(){tone(200,120,0.08,"sawtooth",0.05);},
  hurt(){tone(220,60,0.3,"sawtooth",0.12);},
  dash(){tone(400,1200,0.15,"sine",0.07);},
  bshoot(){tone(180,320,0.09,"square",0.035);},
  roar(){tone(80,40,0.6,"sawtooth",0.12);tone(120,60,0.6,"square",0.08);},
  boom(){tone(120,30,0.8,"sawtooth",0.16);tone(400,50,0.5,"square",0.1);},
  type(){tone(1000+Math.random()*400,900,0.03,"square",0.02);},
  evolve(){[160,200,240,320,400].forEach((f,i)=>tone(f,f*1.5,0.25,"sawtooth",0.06,i*0.12));}
};

/* ---------- ボスの記憶(本物の学習データ) ---------- */
const BRAIN_KEY="nemesis_brain_v1";
function freshBrain(){ return {gen:0,wins:0,losses:0,dodgeL:0,dodgeR:0,distSum:0,distN:0,heat:new Array(12*8).fill(0)}; }
function loadBrain(){
  try{ const b=JSON.parse(localStorage.getItem(BRAIN_KEY)); if(b&&b.heat&&b.heat.length===96) return b; }catch(e){}
  return freshBrain();
}
let brain=loadBrain();
function saveBrain(){ try{localStorage.setItem(BRAIN_KEY,JSON.stringify(brain));}catch(e){} }

// 今バトル中の観測
let obs=null;
function resetObs(){ obs={dodgeL:0,dodgeR:0,distSum:0,distN:0,heat:new Array(96).fill(0)}; }

function mergeObs(){
  // 古い記憶は少し薄れ、新しい観測が上書きしていく
  brain.dodgeL=brain.dodgeL*0.65+obs.dodgeL;
  brain.dodgeR=brain.dodgeR*0.65+obs.dodgeR;
  brain.distSum=brain.distSum*0.65+obs.distSum;
  brain.distN=brain.distN*0.65+obs.distN;
  for(let i=0;i<96;i++) brain.heat[i]=brain.heat[i]*0.65+obs.heat[i];
  brain.gen++;
  saveBrain();
}
// 学習から導く「ボスの性格」(g=挑戦する世代。記憶=brainは常に最新)
function traits(g){
  if(g===undefined)g=brain.gen;
  const dTot=brain.dodgeL+brain.dodgeR;
  const bias=dTot>8?(brain.dodgeR-brain.dodgeL)/dTot:0;   // + なら右に避ける癖
  const avgD=brain.distN>60?brain.distSum/brain.distN:280;
  const lead=Math.min(3,Math.floor(g/2));                  // 世代で偏差射撃が上達
  // ヒートマップ上位セル
  const cells=brain.heat.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
  const total=brain.heat.reduce((s,v)=>s+v,0);
  const hot=[];
  for(const c of cells.slice(0,2)){
    if(total>300&&c.v>total*0.08) hot.push({x:(c.i%12+0.5)*80,y:(Math.floor(c.i/12)+0.5)*75});
  }
  return {
    bias, avgD, lead,
    melee:avgD<230, sniper:avgD>330,
    hot,
    hp:260+g*35,
    bulletSpd:4.2+Math.min(3,g*0.35),
    aggr:1+Math.min(1.2,g*0.12)
  };
}

/* ---------- エンティティ ---------- */
const player={x:W/2,y:H-120,r:11,hp:6,vx:0,vy:0,cool:0,dash:0,dashCd:0,inv:0,face:0};
const boss={x:W/2,y:180,r:34,hp:300,maxHp:300,state:"strafe",t:0,angle:0,tx:0,ty:0,charge:null,flash:0};
let pBullets=[], bBullets=[], particles=[], hazards=[], rings=[];
let T=null; // traits
let shake=0, frame=0, battleFrames=0, streak=0;
let fightGen=0, selGen=null; // 挑戦する世代(タイトルで選択、過去世代と再戦可)
let state="title"; // title | battle | learn | dead? (learnはbattle後)
let learnLines=[], learnChar=0, learnLine=0, learnDone=false, lastResult="";

const keys={}; const mouse={x:W/2,y:H/2,down:false};
addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===" ")e.preventDefault();
  ac(); if(AC&&AC.state==="suspended")AC.resume();
  if(state==="title"){
    if(selGen===null)selGen=brain.gen;
    if(e.key==="ArrowLeft"){selGen=Math.max(0,selGen-1);tone(500,400,0.05,"square",0.04);}
    if(e.key==="ArrowRight"){selGen=Math.min(brain.gen,selGen+1);tone(600,700,0.05,"square",0.04);}
    if(e.key==="Enter") startBattle();
    if(e.key.toLowerCase()==="n"){ brain=freshBrain(); saveBrain(); selGen=0; tone(300,80,0.3,"sawtooth",0.1); }
  }else if(state==="battle"&&e.key==="Escape"){
    state="title";
  }else if(state==="learn"&&e.key==="Enter"){
    if(learnDone) startBattle(); else {learnChar=1e9;}
  }
});
addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});

/* ---------- タッチ操作(左=移動スティック、右=照準スティック+発射) ---------- */
const activePointers=new Map(); // pointerId -> {role,originX,originY,dx,dy}
let touchAimAngle=-Math.PI/2; // 照準スティックの向き(ドラッグの相対方向。絶対座標には依存しない)
function cvPos(e){
  const rc=cv.getBoundingClientRect();
  return {x:(e.clientX-rc.left)*(W/rc.width), y:(e.clientY-rc.top)*(H/rc.height)};
}
cv.addEventListener("pointerdown",e=>{
  ac(); if(AC&&AC.state==="suspended")AC.resume();
  const pos=cvPos(e);
  if(state==="title"){ startBattle(); return; }
  if(state==="learn"){ if(learnDone) startBattle(); else learnChar=1e9; return; }
  if(state!=="battle") return;
  if(e.pointerType==="touch"){
    if(pos.x<W*0.42){
      activePointers.set(e.pointerId,{role:"move",originX:pos.x,originY:pos.y,dx:0,dy:0});
    }else{
      activePointers.set(e.pointerId,{role:"aim",originX:pos.x,originY:pos.y,dx:0,dy:0});
      mouse.down=true;
    }
  }else{
    mouse.x=pos.x; mouse.y=pos.y; mouse.down=true;
  }
});
cv.addEventListener("pointermove",e=>{
  const pos=cvPos(e);
  if(e.pointerType!=="touch"){ mouse.x=pos.x; mouse.y=pos.y; return; }
  const info=activePointers.get(e.pointerId);
  if(!info) return;
  let dx=pos.x-info.originX, dy=pos.y-info.originY;
  const dist=Math.hypot(dx,dy), max=46;
  if(dist>max){ dx=dx/dist*max; dy=dy/dist*max; }
  info.dx=dx; info.dy=dy;
  if(info.role==="move"){
    const dead=10;
    keys["a"]=dx<-dead; keys["d"]=dx>dead;
    keys["w"]=dy<-dead; keys["s"]=dy>dead;
  }else{
    // 照準はドラッグの「相対方向」で決める(タッチ位置そのものではない)。
    // これによりプレイヤーがどこにいても、左にも右にも自在に狙える。
    if(dist>8) touchAimAngle=Math.atan2(dy,dx);
  }
});
function releasePointer(e){
  const info=activePointers.get(e.pointerId);
  if(info){
    if(info.role==="move"){ keys["a"]=keys["d"]=keys["w"]=keys["s"]=false; }
    else if(info.role==="aim"){ mouse.down=false; }
    activePointers.delete(e.pointerId);
  }else if(e.pointerType!=="touch"){ mouse.down=false; }
}
cv.addEventListener("pointerup",releasePointer);
cv.addEventListener("pointercancel",releasePointer);
cv.addEventListener("pointerleave",e=>{ if(e.pointerType==="touch") releasePointer(e); });

const tcGenL=document.getElementById("tcGenL"), tcGenR=document.getElementById("tcGenR");
tcGenL.addEventListener("pointerdown",e=>{
  e.preventDefault(); if(state!=="title")return;
  if(selGen===null)selGen=brain.gen; selGen=Math.max(0,selGen-1); tone(500,400,0.05,"square",0.04);
});
tcGenR.addEventListener("pointerdown",e=>{
  e.preventDefault(); if(state!=="title")return;
  if(selGen===null)selGen=brain.gen; selGen=Math.min(brain.gen,selGen+1); tone(600,700,0.05,"square",0.04);
});
const tcDash=document.getElementById("tcDash");
tcDash.addEventListener("pointerdown",e=>{ e.preventDefault(); keys[" "]=true; tcDash.classList.add("active"); });
const tcDashOff=e=>{ keys[" "]=false; tcDash.classList.remove("active"); };
tcDash.addEventListener("pointerup",tcDashOff);
tcDash.addEventListener("pointercancel",tcDashOff);
tcDash.addEventListener("pointerleave",tcDashOff);

function startBattle(){
  if(selGen===null)selGen=brain.gen;
  fightGen=selGen;
  T=traits(fightGen);
  player.x=W/2; player.y=H-120; player.hp=6; player.inv=0; player.dash=0; player.dashCd=0;
  boss.x=W/2; boss.y=180; boss.hp=T.hp; boss.maxHp=T.hp; boss.state="strafe"; boss.t=90; boss.charge=null;
  pBullets=[];bBullets=[];particles=[];rings=[];
  hazards=T.hot.map(h=>({x:h.x,y:h.y,r:56}));
  resetObs(); battleFrames=0;
  state="battle";
}

/* ---------- 学習画面 ---------- */
function buildLearnLines(won){
  const t=traits(); // merge後
  const L=[];
  L.push(won?"…敗北を記録した。だが、この痛みはデータになる。":"排除完了。だが油断はしない。お前は戻ってくる。");
  const dTot=brain.dodgeL+brain.dodgeR;
  if(dTot>10){
    const r=Math.round(brain.dodgeR/dTot*100);
    if(r>=62) L.push(`解析:お前は弾を【右】へ避ける癖がある(${r}%)。偏差射撃を右に補正した。`);
    else if(r<=38) L.push(`解析:お前は弾を【左】へ避ける癖がある(${100-r}%)。偏差射撃を左に補正した。`);
    else L.push("解析:お前の回避方向は読みにくい。……厄介だ。");
  }
  if(t.melee) L.push("解析:お前は接近戦を好む。近づく者には、灼熱の環を。");
  else if(t.sniper) L.push("解析:お前は遠くから撃つ臆病者だ。【突進】を覚えた。");
  if(t.hot.length>0) L.push("解析:お前が好んで立つ座標は把握済みだ。そこに【地雷】を敷設した。");
  if(t.lead>0) L.push(`偏差射撃 Lv${t.lead}:お前の移動先を予測して撃つ。`);
  if(brain.gen===3) L.push("進化:出力臨界。新兵装【殲滅光線】を解禁した。");
  if(brain.gen===5) L.push("進化:駆動系再構築。新兵装【双螺旋弾幕】を解禁した。");
  L.push(`NEMESIS は 第${brain.gen}世代 へ進化する。`);
  return L;
}
function endBattle(won){
  lastResult=won?"win":"lose";
  if(fightGen>=brain.gen){
    // 最新世代との戦い → NEMESISは学習し進化する
    if(won){brain.wins++; streak++;} else {brain.losses++; streak=0;}
    mergeObs();
    learnLines=buildLearnLines(won);
    selGen=brain.gen;
  }else{
    // 過去世代との再戦 → 記録映像との戦い。進化しない
    learnLines=[
      won?`アーカイブ第${fightGen}世代を再び沈黙させた。`:`……アーカイブ第${fightGen}世代に敗れるとは。`,
      `(過去世代との戦闘では NEMESIS は学習・進化しない)`,
      `現在の本体は 第${brain.gen}世代 で待っている。`
    ];
  }
  learnChar=0; learnLine=0; learnDone=false;
  sfx.evolve();
  state="learn";
}

/* ---------- 更新 ---------- */
function burst(x,y,col,n,sp=4){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.283, s=0.5+Math.random()*sp;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*25,col});
  }
}
function update(){
  frame++;
  if(state!=="battle")return;
  battleFrames++;

  // タッチ照準中は、常に現在のプレイヤー位置+ドラッグ方向で仮想マウス位置を再計算する
  for(const [,info] of activePointers){
    if(info.role==="aim"){
      mouse.x=player.x+Math.cos(touchAimAngle)*100;
      mouse.y=player.y+Math.sin(touchAimAngle)*100;
    }
  }

  /* --- プレイヤー --- */
  const ax=(keys["d"]?1:0)-(keys["a"]?1:0), ay=(keys["s"]?1:0)-(keys["w"]?1:0);
  const sp=player.dash>0?11:3.6;
  const len=Math.hypot(ax,ay)||1;
  if(player.dash>0){ player.dash--; }
  else{ player.vx=ax/len*sp; player.vy=ay/len*sp; }
  if((keys[" "]||keys["shift"])&&player.dashCd<=0&&(ax||ay)){
    player.dash=9; player.dashCd=55; player.inv=Math.max(player.inv,14);
    player.vx=ax/len*11; player.vy=ay/len*11; sfx.dash();
    burst(player.x,player.y,"#4df0ff",10,2);
  }
  if(player.dashCd>0)player.dashCd--;
  if(player.inv>0)player.inv--;
  player.x=Math.max(14,Math.min(W-14,player.x+player.vx));
  player.y=Math.max(14,Math.min(H-14,player.y+player.vy));

  // 射撃
  if(player.cool>0)player.cool--;
  if(mouse.down&&player.cool<=0){
    const a=Math.atan2(mouse.y-player.y,mouse.x-player.x);
    pBullets.push({x:player.x+Math.cos(a)*14,y:player.y+Math.sin(a)*14,vx:Math.cos(a)*9,vy:Math.sin(a)*9,life:80});
    player.cool=9; sfx.shoot();
  }

  /* --- 観測(ボスはお前を見ている) --- */
  const dist=Math.hypot(player.x-boss.x,player.y-boss.y);
  obs.distSum+=dist; obs.distN++;
  if(battleFrames%6===0){
    const cx=Math.min(11,Math.max(0,Math.floor(player.x/80)));
    const cyy=Math.min(7,Math.max(0,Math.floor(player.y/75)));
    obs.heat[cyy*12+cx]++;
  }

  /* --- ボスAI --- */
  boss.angle+=0.02;
  if(boss.flash>0)boss.flash--;
  const toP=Math.atan2(player.y-boss.y,player.x-boss.x);
  if(boss.state==="strafe"){
    boss.t--;
    // 好みの距離を保つ(学習: 近接屋なら離れ、砲台屋なら詰める)
    const pref=T.melee?300:(T.sniper?200:250);
    const dd=dist-pref;
    const mv=0.9*T.aggr;
    boss.x+=Math.cos(toP)*Math.sign(dd)*mv+Math.cos(boss.angle*3)*1.2;
    boss.y+=Math.sin(toP)*Math.sign(dd)*mv+Math.sin(boss.angle*2)*1.2;
    boss.x=Math.max(60,Math.min(W-60,boss.x));
    boss.y=Math.max(60,Math.min(H-60,boss.y));
    if(boss.t<=0){
      // 攻撃選択(学習による重み)
      const w=[];
      w.push(["aim",3+T.lead]);
      w.push(["radial",2]);
      if(T.sniper)w.push(["chargeAtk",3.5]); else w.push(["chargeAtk",0.8+fightGen*0.1]);
      if(T.melee)w.push(["nova",3.5]); else if(dist<160)w.push(["nova",2]);
      if(fightGen>=3)w.push(["laser",2.5]);
      if(fightGen>=5)w.push(["spiral",2.5]);
      let tot=w.reduce((s,x)=>s+x[1],0), r=Math.random()*tot, pick="aim";
      for(const [n,ww] of w){ r-=ww; if(r<=0){pick=n;break;} }
      boss.state=pick; boss.t=0;
    }
  }
  else if(boss.state==="aim"){
    boss.t++;
    if(boss.t%16===1&&boss.t<16*4*T.aggr){
      // ★学習の核心:偏差射撃 — 未来位置予測 + 回避癖への補正
      const lead=T.lead*11;
      let tx=player.x+player.vx*lead, ty=player.y+player.vy*lead;
      const dTot=brain.dodgeL+brain.dodgeR;
      if(dTot>10){
        const bias=(brain.dodgeR-brain.dodgeL)/dTot; // +:右に避ける
        const base=Math.atan2(ty-boss.y,tx-boss.x);
        // 弾から見た「右」= 進行方向+90°
        tx+=Math.cos(base+Math.PI/2)*bias*70;
        ty+=Math.sin(base+Math.PI/2)*bias*70;
      }
      const a=Math.atan2(ty-boss.y,tx-boss.x);
      for(let k=-1;k<=1;k++){
        const aa=a+k*0.09;
        bBullets.push({x:boss.x,y:boss.y,vx:Math.cos(aa)*T.bulletSpd,vy:Math.sin(aa)*T.bulletSpd,life:200,r:6,near:false,col:"#ff2f6d"});
      }
      sfx.bshoot();
    }
    if(boss.t>16*4*T.aggr+20){boss.state="strafe";boss.t=70/T.aggr;}
  }
  else if(boss.state==="radial"){
    boss.t++;
    if(boss.t===20||boss.t===50){
      const n=10+fightGen;
      const off=Math.random()*6.28;
      for(let i=0;i<n;i++){
        const a=off+i/n*6.283;
        bBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*(T.bulletSpd*0.75),vy:Math.sin(a)*(T.bulletSpd*0.75),life:260,r:6,near:false,col:"#ffa51e"});
      }
      sfx.bshoot();
    }
    if(boss.t>75){boss.state="strafe";boss.t=80/T.aggr;}
  }
  else if(boss.state==="chargeAtk"){
    boss.t++;
    if(boss.t===1){ boss.tx=player.x; boss.ty=player.y; sfx.roar(); }
    if(boss.t===36){
      const a=Math.atan2(boss.ty-boss.y,boss.tx-boss.x);
      boss.charge={vx:Math.cos(a)*15,vy:Math.sin(a)*15,t:26};
    }
    if(boss.charge){
      boss.x+=boss.charge.vx; boss.y+=boss.charge.vy;
      boss.x=Math.max(50,Math.min(W-50,boss.x));
      boss.y=Math.max(50,Math.min(H-50,boss.y));
      burst(boss.x,boss.y,"#ff2f6d",2,2);
      boss.charge.t--;
      if(boss.charge.t<=0){boss.charge=null;boss.state="strafe";boss.t=90/T.aggr;shake=6;}
    }
  }
  else if(boss.state==="laser"){
    boss.t++;
    if(boss.t===1){ boss.laserA=Math.atan2(player.y-boss.y,player.x-boss.x)-0.55; sfx.roar(); }
    if(boss.t>=45&&boss.t<=110){
      boss.laserA+=0.019;
      const dx=Math.cos(boss.laserA),dy=Math.sin(boss.laserA);
      const px=player.x-boss.x,py=player.y-boss.y;
      const along=px*dx+py*dy;
      if(along>boss.r){
        const d=Math.abs(px*dy-py*dx);
        if(d<16)hurt(1);
      }
      if(boss.t%6===0)shake=Math.max(shake,3);
    }
    if(boss.t>120){boss.state="strafe";boss.t=85/T.aggr;}
  }
  else if(boss.state==="spiral"){
    boss.t++;
    if(boss.t>15&&boss.t<115&&boss.t%4===0){
      const a=boss.t*0.31;
      for(let k=0;k<2;k++){
        const aa=a+k*Math.PI;
        bBullets.push({x:boss.x,y:boss.y,vx:Math.cos(aa)*3.4,vy:Math.sin(aa)*3.4,life:240,r:5,near:false,col:"#c86bff"});
      }
      if(boss.t%16===0)sfx.bshoot();
    }
    if(boss.t>135){boss.state="strafe";boss.t=85/T.aggr;}
  }
  else if(boss.state==="nova"){
    boss.t++;
    if(boss.t===30){
      rings.push({x:boss.x,y:boss.y,r:boss.r+6,speed:5.5,hit:false});
      sfx.roar(); shake=8;
    }
    if(boss.t>55){boss.state="strafe";boss.t=70/T.aggr;}
  }

  /* --- 弾 --- */
  pBullets=pBullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(Math.hypot(b.x-boss.x,b.y-boss.y)<boss.r){
      boss.hp-=2; boss.flash=4; sfx.hitBoss();
      burst(b.x,b.y,"#4df0ff",5,3);
      return false;
    }
    return b.life>0&&b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10;
  });
  bBullets=bBullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    // ★回避の観測:弾がニアミスした瞬間、プレイヤーの横移動方向を記録
    if(!b.near&&d<110){
      b.near=true;
      const bl=Math.hypot(b.vx,b.vy)||1;
      const cross=(b.vx/bl)*player.vy-(b.vy/bl)*player.vx; // +:弾から見て右へ
      if(cross>1.2)obs.dodgeR++; else if(cross<-1.2)obs.dodgeL++;
    }
    if(d<b.r+player.r-2){ hurt(1); return false; }
    return b.life>0&&b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20;
  });
  // 突進体当たり
  if(boss.charge&&Math.hypot(player.x-boss.x,player.y-boss.y)<boss.r+player.r){ hurt(2); }
  // ノヴァリング
  rings=rings.filter(rg=>{
    rg.r+=rg.speed;
    const d=Math.hypot(player.x-rg.x,player.y-rg.y);
    if(!rg.hit&&Math.abs(d-rg.r)<12){ rg.hit=true; hurt(1); }
    return rg.r<Math.max(W,H);
  });
  // 地雷(学習で敷設)
  for(const hz of hazards){
    const d=Math.hypot(player.x-hz.x,player.y-hz.y);
    if(d<hz.r&&frame%40===0) hurt(1);
  }

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life--;return p.life>0;});
  if(shake>0)shake--;

  if(boss.hp<=0){
    sfx.boom(); shake=18;
    burst(boss.x,boss.y,"#ff2f6d",70,8); burst(boss.x,boss.y,"#ffa51e",50,6);
    endBattle(true);
  }
}
function hurt(n){
  if(player.inv>0)return;
  player.hp-=n; player.inv=50; sfx.hurt(); shake=10;
  burst(player.x,player.y,"#ff4d6d",18,4);
  if(player.hp<=0){ endBattle(false); }
}

/* ---------- 描画 ---------- */
function drawBossBody(){
  ctx.save();
  ctx.translate(boss.x,boss.y);
  const gg=state==="title"?(selGen===null?brain.gen:selGen):fightGen;
  const hue=(340-gg*14%160+360)%360;
  // オーラ
  ctx.shadowColor=`hsl(${hue},95%,55%)`; ctx.shadowBlur=30;
  // コア(世代で角が増える)
  const sides=Math.min(9,4+Math.floor(gg/2));
  ctx.rotate(boss.angle);
  ctx.fillStyle=boss.flash>0?"#ffffff":`hsl(${hue},85%,${38+Math.sin(frame/12)*6}%)`;
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=i/sides*6.283, rr=boss.r*(1+0.14*Math.sin(frame/8+i*2));
    ctx[i?"lineTo":"moveTo"](Math.cos(a)*rr,Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
  ctx.rotate(-boss.angle);
  // 目(プレイヤーを追う)
  const toP=Math.atan2(player.y-boss.y,player.x-boss.x);
  ctx.shadowBlur=0;
  ctx.fillStyle="#0a0a10";
  ctx.beginPath();ctx.arc(0,0,12,0,7);ctx.fill();
  ctx.fillStyle="#ff2f6d";
  ctx.beginPath();ctx.arc(Math.cos(toP)*5,Math.sin(toP)*5,5,0,7);ctx.fill();
  // 進化パーツ(世代の数だけ周回する破片)
  const parts=Math.min(14,gg);
  for(let i=0;i<parts;i++){
    const a=boss.angle*2+i/Math.max(1,parts)*6.283;
    const rr=boss.r+22+6*Math.sin(frame/10+i);
    ctx.save();
    ctx.translate(Math.cos(a)*rr,Math.sin(a)*rr);
    ctx.rotate(a+frame/10);
    ctx.shadowColor=`hsl(${hue},95%,60%)`; ctx.shadowBlur=10;
    ctx.fillStyle=`hsl(${hue},90%,60%)`;
    ctx.fillRect(-5,-5,10,10);
    ctx.restore();
  }
  ctx.restore();
}
const tcGenRow=document.getElementById("tcGenRow"), tcBattleRow=document.getElementById("tcBattleRow");
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  tcGenRow.classList.toggle("show",state==="title");
  tcBattleRow.classList.toggle("show",state==="battle");
  if(state==="title"){drawTitle();return;}
  if(state==="learn"){drawLearn();return;}
  if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  // 背景グリッド
  ctx.strokeStyle="rgba(255,47,109,0.05)";ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<W;x+=48){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(let y=0;y<H;y+=48){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();
  // 地雷
  for(const hz of hazards){
    ctx.save();
    const pul=0.75+0.25*Math.sin(frame/9);
    ctx.strokeStyle=`rgba(255,80,40,${0.5*pul})`;
    ctx.fillStyle=`rgba(255,60,30,${0.10*pul})`;
    ctx.lineWidth=2; ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.arc(hz.x,hz.y,hz.r,0,7);ctx.fill();ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=`rgba(255,120,60,${pul})`;ctx.font="10px sans-serif";ctx.textAlign="center";
    ctx.fillText("⚠ LEARNED",hz.x,hz.y+3);
    ctx.restore();
  }
  // 突進の予告線
  if(boss.state==="chargeAtk"&&boss.t<36&&!boss.charge){
    ctx.strokeStyle=`rgba(255,47,109,${0.3+0.5*Math.sin(frame/2)})`;
    ctx.lineWidth=3;ctx.setLineDash([12,8]);
    ctx.beginPath();ctx.moveTo(boss.x,boss.y);
    const a=Math.atan2(boss.ty-boss.y,boss.tx-boss.x);
    ctx.lineTo(boss.x+Math.cos(a)*900,boss.y+Math.sin(a)*900);
    ctx.stroke();ctx.setLineDash([]);
  }
  // 殲滅光線
  if(boss.state==="laser"&&boss.t>=1){
    const a=boss.laserA;
    if(boss.t<45){
      ctx.save();
      ctx.strokeStyle=`rgba(200,107,255,${0.25+0.35*Math.sin(frame/2)})`;
      ctx.lineWidth=2;ctx.setLineDash([10,8]);
      ctx.beginPath();ctx.moveTo(boss.x,boss.y);
      ctx.lineTo(boss.x+Math.cos(a)*1200,boss.y+Math.sin(a)*1200);
      ctx.moveTo(boss.x,boss.y);
      ctx.lineTo(boss.x+Math.cos(a+1.25)*1200,boss.y+Math.sin(a+1.25)*1200);
      ctx.stroke();ctx.setLineDash([]);ctx.restore();
    }else if(boss.t<=110){
      ctx.save();
      ctx.shadowColor="#c86bff";ctx.shadowBlur=22;
      ctx.strokeStyle="rgba(200,107,255,0.95)";ctx.lineWidth=10;
      ctx.beginPath();ctx.moveTo(boss.x,boss.y);
      ctx.lineTo(boss.x+Math.cos(a)*1200,boss.y+Math.sin(a)*1200);
      ctx.stroke();
      ctx.strokeStyle="#ffffff";ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(boss.x,boss.y);
      ctx.lineTo(boss.x+Math.cos(a)*1200,boss.y+Math.sin(a)*1200);
      ctx.stroke();ctx.restore();
    }
  }
  // ノヴァ
  for(const rg of rings){
    ctx.strokeStyle="rgba(255,165,30,0.85)";ctx.lineWidth=7;
    ctx.save();ctx.shadowColor="#ffa51e";ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(rg.x,rg.y,rg.r,0,7);ctx.stroke();ctx.restore();
  }
  drawBossBody();
  // 弾
  for(const b of bBullets){
    ctx.save();ctx.shadowColor=b.col;ctx.shadowBlur=10;
    ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();ctx.restore();
  }
  for(const b of pBullets){
    ctx.save();ctx.shadowColor="#4df0ff";ctx.shadowBlur=8;
    ctx.fillStyle="#4df0ff";ctx.fillRect(b.x-3,b.y-3,6,6);ctx.restore();
  }
  // パーティクル
  for(const p of particles){
    ctx.globalAlpha=Math.min(1,p.life/20);
    ctx.fillStyle=p.col;ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;
  // プレイヤー
  ctx.save();
  if(player.inv>0&&player.dash<=0&&frame%6<3)ctx.globalAlpha=0.35;
  ctx.shadowColor="#4df0ff";ctx.shadowBlur=14;
  ctx.fillStyle="#e8faff";
  ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,7);ctx.fill();
  const aim=Math.atan2(mouse.y-player.y,mouse.x-player.x);
  ctx.fillStyle="#4df0ff";
  ctx.beginPath();ctx.arc(player.x+Math.cos(aim)*8,player.y+Math.sin(aim)*8,3.5,0,7);ctx.fill();
  ctx.restore();
  // タッチ操作スティックの可視化(移動=白、照準=赤)
  for(const [,info] of activePointers){
    const col=info.role==="aim"?"255,47,109":"255,255,255";
    ctx.save();
    ctx.strokeStyle=`rgba(${col},0.35)`; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(info.originX,info.originY,46,0,7);ctx.stroke();
    ctx.fillStyle=`rgba(${col},0.55)`;
    ctx.beginPath();ctx.arc(info.originX+info.dx,info.originY+info.dy,18,0,7);ctx.fill();
    ctx.restore();
  }
  // HUD
  ctx.setTransform(1,0,0,1,0,0);
  // ボスHP
  ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fillRect(W/2-260,16,520,14);
  ctx.fillStyle="#ff2f6d";ctx.fillRect(W/2-260,16,520*Math.max(0,boss.hp/boss.maxHp),14);
  ctx.font="12px sans-serif";ctx.textAlign="center";ctx.fillStyle="#ffb3c8";
  const dTot=brain.dodgeL+brain.dodgeR;
  let learned=[];
  if(T.lead>0)learned.push("偏差Lv"+T.lead);
  if(dTot>10)learned.push("回避癖 解析済");
  if(T.sniper)learned.push("突進 強化");
  if(T.melee)learned.push("対近接 灼熱環");
  if(hazards.length)learned.push("地雷 敷設");
  if(fightGen>=3)learned.push("殲滅光線");
  if(fightGen>=5)learned.push("双螺旋");
  const replay=fightGen<brain.gen?"(アーカイブ戦)":"";
  ctx.fillText(`NEMESIS 第${fightGen}世代${replay}${learned.length?"　[学習: "+learned.join(" / ")+"]":"　[まだ何も知らない]"}`,W/2,48);
  // プレイヤーHP
  for(let i=0;i<6;i++){
    ctx.fillStyle=i<player.hp?"#4df0ff":"rgba(255,255,255,0.12)";
    ctx.fillRect(24+i*22,H-32,16,10);
  }
  // ダッシュCD
  ctx.fillStyle="rgba(255,255,255,0.12)";ctx.fillRect(24,H-16,128,5);
  ctx.fillStyle="#8aff2f";ctx.fillRect(24,H-16,128*(1-player.dashCd/55),5);
  ctx.textAlign="left";ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="11px sans-serif";
  ctx.fillText("連勝: "+streak,24,H-42);
}
function drawTitle(){
  const t=performance.now()/1000;
  ctx.fillStyle="#08080e";ctx.fillRect(0,0,W,H);
  ctx.textAlign="center";
  ctx.save();ctx.shadowColor="#ff2f6d";ctx.shadowBlur=30;
  ctx.fillStyle="#ff2f6d";ctx.font="bold 64px sans-serif";
  ctx.fillText("N E M E S I S",W/2,160);ctx.restore();
  ctx.fillStyle="#e8e8f0";ctx.font="18px sans-serif";
  ctx.fillText("そいつは、お前の癖を覚えている。",W/2,215);
  ctx.fillStyle="#9aa";ctx.font="14px sans-serif";
  ctx.fillText("回避の方向。好みの間合い。よく立つ場所。",W/2,248);
  ctx.fillText("倒しても、倒されても——次の世代は、より賢い。",W/2,272);
  if(selGen===null)selGen=brain.gen;
  // 世代セレクタ
  ctx.fillStyle="#ffa51e";ctx.font="bold 22px sans-serif";
  const lArrow=selGen>0?"◀ ":"　";
  const rArrow=selGen<brain.gen?" ▶":"　";
  ctx.fillText(`${lArrow}挑戦する世代: 第${selGen}世代${rArrow}`,W/2,330);
  ctx.font="13px sans-serif";
  if(brain.gen>0){
    ctx.fillStyle=selGen<brain.gen?"#8aa":"#ffa51e";
    ctx.fillText(selGen<brain.gen
      ?`アーカイブ戦(学習・進化なし)　※最新は第${brain.gen}世代`
      :`最新世代——勝っても負けても、こいつは学ぶ (勝${brain.wins}/敗${brain.losses})`,W/2,358);
    ctx.fillStyle="#667";ctx.fillText("←→で世代選択　Nで記憶を全消去",W/2,382);
  }else{
    ctx.fillStyle="#8aff2f";
    ctx.fillText("第0世代:まだ何も学習していない、無垢な NEMESIS",W/2,358);
  }
  if(Math.sin(t*4)>0){
    ctx.fillStyle="#fff";ctx.font="bold 20px sans-serif";
    ctx.fillText("― ENTER / クリック で交戦 ―",W/2,425);
  }
  // デモボス
  boss.x=W/2;boss.y=500;boss.angle+=0.02;frame++;
  drawBossBody();
}
function drawLearn(){
  ctx.fillStyle="#050508";ctx.fillRect(0,0,W,H);
  ctx.textAlign="center";
  ctx.fillStyle=lastResult==="win"?"#4df0ff":"#ff2f6d";
  ctx.font="bold 34px sans-serif";
  ctx.fillText(lastResult==="win"?"VICTORY — だが敵は学ぶ":"YOU DIED — 敵は学んだ",W/2,90);
  ctx.font="16px 'Consolas',monospace";ctx.textAlign="left";
  let y=160;
  let remaining=learnChar;
  for(let i=0;i<learnLines.length;i++){
    const line=learnLines[i];
    if(remaining<=0)break;
    const show=line.slice(0,Math.min(line.length,remaining));
    ctx.fillStyle=i===learnLines.length-1?"#ffa51e":"#c8ffc8";
    ctx.fillText("▸ "+show,140,y);
    remaining-=line.length;
    y+=44;
  }
  const totalChars=learnLines.reduce((s,l)=>s+l.length,0);
  if(learnChar<totalChars){
    learnChar+=1;
    if(frame%3===0)sfx.type();
  }else if(!learnDone){
    learnDone=true;
  }
  frame++;
  if(learnDone&&Math.sin(performance.now()/300)>0){
    ctx.textAlign="center";ctx.fillStyle="#fff";ctx.font="bold 18px sans-serif";
    ctx.fillText("― ENTER で再戦 ―",W/2,H-70);
  }
}

let last=performance.now(),acc=0;
function tick(now){
  acc+=Math.min(now-last,100);last=now;
  while(acc>=1000/60){update();acc-=1000/60;}
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
